<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>옷BTI 궁합 보기 💕</title>
    <meta property="og:title" content="옷BTI 궁합 보기 💕">
    <meta property="og:description" content="나와 상대방의 옷BTI 궁합은? 같이 살면 잘 맞을까?">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0STZK1YFH6"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-0STZK1YFH6');
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
        .container { max-width: 480px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; font-size: 24px; margin: 30px 0 8px; }
        h1 span { color: #FFD700; }
        .sub { text-align: center; color: #888; font-size: 14px; margin-bottom: 30px; }
        .section-label { color: #FFD700; font-size: 14px; font-weight: 700; margin-bottom: 12px; }
        .type-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 28px; }
        .type-btn {
            background: #1a1a1a; border: 2px solid #333; color: #fff;
            padding: 14px 8px; font-size: 14px; border-radius: 12px;
            cursor: pointer; font-family: inherit; transition: all 0.2s; text-align: center; line-height: 1.3;
        }
        .type-btn:hover { border-color: #FFD700; }
        .type-btn.selected { border-color: #FFD700; background: #1f1a00; color: #FFD700; }
        .vs { text-align: center; font-size: 28px; margin: 8px 0 20px; color: #666; }
        .result-box {
            background: #111; border: 1px solid #333; border-radius: 20px;
            padding: 24px; text-align: center; margin-top: 20px; display: none;
            animation: fadeIn 0.5s ease;
        }
        .score { font-size: 48px; font-weight: 900; margin-bottom: 4px; }
        .score.great { color: #4CAF50; }
        .score.good { color: #FFD700; }
        .score.meh { color: #FF9800; }
        .score.chaos { color: #ff6b6b; }
        .label { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
        .detail { color: #bbb; font-size: 14px; line-height: 1.7; text-align: left; }
        .detail .highlight { color: #FFD700; font-weight: 700; }
        .share-btn {
            display: block; width: 100%; background: #FEE500; color: #000;
            border: none; padding: 14px; border-radius: 12px; font-size: 15px;
            font-weight: 700; cursor: pointer; margin-top: 20px; font-family: inherit;
        }
        .test-link {
            display: block; text-align: center; color: #FFD700; margin-top: 20px;
            font-size: 14px; text-decoration: none;
        }
        .selected-display {
            text-align: center; padding: 12px; background: #1a1a1a;
            border-radius: 12px; margin-bottom: 8px; font-size: 16px; display: none;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="container">
    <h1>💕 <span>옷BTI 궁합</span> 보기</h1>
    <p class="sub">나와 상대방의 유형을 고르면 바로 결과!</p>

    <div class="section-label">👤 나의 옷BTI</div>
    <div id="mySelected" class="selected-display"></div>
    <div class="type-grid" id="myGrid"></div>

    <div class="vs">×</div>

    <div class="section-label">💕 상대방의 옷BTI</div>
    <div id="otherSelected" class="selected-display"></div>
    <div class="type-grid" id="otherGrid"></div>

    <div class="result-box" id="resultBox">
        <div class="score" id="rScore"></div>
        <div class="label" id="rLabel"></div>
        <p class="detail" id="rDetail"></p>
        <button class="share-btn" onclick="shareResult()">💬 카카오톡으로 궁합 공유</button>
    </div>

    <a href="https://tinyurl.com/otBTI" class="test-link">아직 옷BTI 안 했어? → 테스트하러 가기</a>
</div>

<script>
    const typeList = [
        { id: "closet-mogul", emoji: "💎", name: "옷장 재벌형" },
        { id: "luxury-hoarder", emoji: "👑", name: "명품 잠금형" },
        { id: "impulse-survivor", emoji: "🛍️", name: "충동구매 서바이버형" },
        { id: "dark-horse", emoji: "📦", name: "옷장 다크호스형" },
        { id: "minimal-rich", emoji: "♻️", name: "미니멀 자산가형" },
        { id: "clean-saint", emoji: "😇", name: "옷장 성인군자형" },
        { id: "closet-neglect", emoji: "🗑️", name: "옷장 방치형" },
        { id: "fast-fashion", emoji: "🔄", name: "패스트패션 회전형" }
    ];

    const compat = {
        "closet-mogul": {
            "closet-mogul": { score: 72, label: "💎+💎 옷장 영토 전쟁", cls: "good", text: "서로의 옷을 몰래 입다 걸리면 <span class='highlight'>진짜 싸움 납니다</span>. '내 캐시미어 왜 니가 입어?!' 주 3회 발생. 근데 외출하면 커플룩이 자동 완성돼서 주변에서 부러워함." },
            "luxury-hoarder": { score: 95, label: "💎+👑 서로 옷 빌려입는 소울메이트", cls: "great", text: "<span class='highlight'>서로의 옷장이 곧 내 옷장</span>. 취향이 통해서 한 벌 사면 두 명이 입음. 옷값 반으로 줄어드는 기적." },
            "impulse-survivor": { score: 38, label: "💎+🛍️ 카드값으로 이혼 위기", cls: "chaos", text: "둘이 같이 세일 가면 <span class='highlight'>월급 2달치가 증발</span>. 서로 자극해서 '너도 샀잖아'로 정당화." },
            "dark-horse": { score: 78, label: "💎+📦 발굴의 재미", cls: "good", text: "재벌형이 '이거 버릴까' 하면 다크호스가 '<span class='highlight'>미쳤어 이거 빈티지야!</span>' 하면서 구출." },
            "minimal-rich": { score: 92, label: "💎+♻️ 찰떡 밸런스 커플", cls: "great", text: "재벌형이 사오면 미니멀형이 <span class='highlight'>'그만큼 버려'</span> 규칙 적용. 1 in 1 out 시스템이 자연스럽게 완성." },
            "clean-saint": { score: 65, label: "💎+😇 잔소리 지옥", cls: "meh", text: "'<span class='highlight'>또 샀어? 또?!</span>' 가 하루 5번. 택배 상자를 화장실에서 뜯는 지경까지 감." },
            "closet-neglect": { score: 22, label: "💎+🗑️ 동거 하면 안 되는 조합", cls: "chaos", text: "재벌형의 30만원짜리 코트가 방치형 옷더미 밑에서 <span class='highlight'>구겨진 채 발견</span>. 이때 진심으로 이별 고민함." },
            "fast-fashion": { score: 48, label: "💎+🔄 서로 이해 불가", cls: "chaos", text: "재벌형: '이 코트 3년째 입어' / 회전형: '3년?! 그걸 아직도?!' <span class='highlight'>쇼핑 가면 각자 다른 층</span>." }
        },
        "luxury-hoarder": {
            "luxury-hoarder": { score: 58, label: "👑+👑 옷장 박물관 부부", cls: "meh", text: "둘 다 아껴서 <span class='highlight'>매일 같은 옷</span>인데 옷장엔 명품이 가득. 특별한 날이 영원히 안 옴." },
            "impulse-survivor": { score: 42, label: "👑+🛍️ 매일 싸우는 커플", cls: "chaos", text: "잠금형: '그거 왜 또 샀어?' 충동형: '세일이었어!' <span class='highlight'>이 대화를 주 7회 반복</span>." },
            "dark-horse": { score: 73, label: "👑+📦 조용한 공생", cls: "good", text: "둘 다 조용히 옷을 모으다가 어느 날 서로의 옷장을 열고 <span class='highlight'>'대박 이런 것도 있었어?!'</span>" },
            "minimal-rich": { score: 97, label: "👑+♻️ 인생 찰떡궁합", cls: "great", text: "둘 다 <span class='highlight'>좋은 거 하나를 오래 입는 철학</span>이 같음. 동거 추천 1순위." },
            "clean-saint": { score: 82, label: "👑+😇 평화로운 동거", cls: "good", text: "잠금형이 5년째 안 입는 옷을 성인군자형이 슬쩍 팔아줌. <span class='highlight'>'15만원 들어왔어'</span>. 감사 인사 나오는 궁합." },
            "closet-neglect": { score: 18, label: "👑+🗑️ 이별 사유 1위", cls: "chaos", text: "잠금형이 소중히 보관한 옷을 방치형이 바닥에 던져놓은 순간 <span class='highlight'>사랑이 식음</span>." },
            "fast-fashion": { score: 35, label: "👑+🔄 근본적 가치관 충돌", cls: "chaos", text: "'한 벌에 30만원' vs '30만원이면 15벌'. <span class='highlight'>쇼핑몰 가면 논쟁 1시간</span>." }
        },
        "impulse-survivor": {
            "impulse-survivor": { score: 25, label: "🛍️+🛍️ 파산 커플", cls: "chaos", text: "둘이 합치면 <span class='highlight'>카드값이 월급의 2배</span>. 택배 올 때마다 서로 거짓말 대회." },
            "dark-horse": { score: 68, label: "🛍️+📦 사는 사람 + 안 버리는 사람", cls: "meh", text: "충동형이 매주 사오고 다크호스가 하나도 안 버림. <span class='highlight'>옷이 집을 점령하는 건 시간문제</span>." },
            "minimal-rich": { score: 52, label: "🛍️+♻️ 교도소와 죄수", cls: "meh", text: "미니멀형이 <span class='highlight'>소비 교도관</span> 역할. '그거 진짜 필요해?' 가 하루 10번." },
            "clean-saint": { score: 55, label: "🛍️+😇 엄마와 딸 동거", cls: "meh", text: "'<span class='highlight'>또 택배야?!</span>' '아 이번엔 진짜 필요해서…' 무한 반복." },
            "closet-neglect": { score: 12, label: "🛍️+🗑️ 🚨 재난 위험 🚨", cls: "chaos", text: "한 명은 미친 듯이 사고 한 명은 절대 안 치움. <span class='highlight'>6개월 후 바닥이 안 보임</span>." },
            "fast-fashion": { score: 45, label: "🛍️+🔄 브레이크 없는 차", cls: "chaos", text: "같이 쇼핑 가면 <span class='highlight'>서로 멈추게 해줄 사람이 없음</span>." }
        },
        "dark-horse": {
            "dark-horse": { score: 55, label: "📦+📦 추억 저장소 커플", cls: "meh", text: "옷 하나에 추억 하나. 둘 다 못 버려서 <span class='highlight'>옷장이 타임캡슐</span>." },
            "minimal-rich": { score: 68, label: "📦+♻️ 성장형 관계", cls: "meh", text: "미니멀형이 옆에서 <span class='highlight'>정리의 기술을 전수</span>. 힘들지만 1년 후 감사할 관계." },
            "clean-saint": { score: 88, label: "📦+😇 인생 구원자", cls: "great", text: "성인군자형이 다크호스 옷장을 열고 <span class='highlight'>'여기서 보물이 나왔다'</span> 하면서 정리해줌." },
            "closet-neglect": { score: 30, label: "📦+🗑️ 같이 침몰", cls: "chaos", text: "둘 다 옷장을 안 열어. <span class='highlight'>같이 방치하는 동맹</span>. 어느 날 옷장에서 이상한 냄새가…" },
            "fast-fashion": { score: 50, label: "📦+🔄 속도 차이 갈등", cls: "meh", text: "회전형: '이거 유행 지났어 버려' / 다크호스: '<span class='highlight'>유행은 돌아와!</span>'" }
        },
        "minimal-rich": {
            "minimal-rich": { score: 85, label: "♻️+♻️ 미니멀 천국", cls: "great", text: "옷장 합쳐도 20벌. <span class='highlight'>이사할 때 택배 1박스</span>." },
            "clean-saint": { score: 93, label: "♻️+😇 동거 만점 조합", cls: "great", text: "둘 다 깔끔하고 불필요한 소비 안 함. <span class='highlight'>모델하우스 같은 옷장</span>." },
            "closet-neglect": { score: 33, label: "♻️+🗑️ 스트레스 동거", cls: "chaos", text: "미니멀형이 방치형을 <span class='highlight'>개조하려다 폭발</span>. '왜 안 치워?!' 3개월째 같은 대화." },
            "fast-fashion": { score: 40, label: "♻️+🔄 매일 작은 전쟁", cls: "chaos", text: "'하나를 오래' vs '여러 개를 짧게'. <span class='highlight'>근본적 가치관 차이</span>." }
        },
        "clean-saint": {
            "clean-saint": { score: 88, label: "😇+😇 정리왕 커플", cls: "great", text: "옷장이 항상 완벽. <span class='highlight'>정리 유튜브 같이 찍어도 될 수준</span>." },
            "closet-neglect": { score: 45, label: "😇+🗑️ 인내심 극한 테스트", cls: "chaos", text: "성인군자형이 방치형을 구원하려 하지만 <span class='highlight'>3개월이면 인내심 바닥</span>." },
            "fast-fashion": { score: 62, label: "😇+🔄 나쁘지 않은 궁합", cls: "meh", text: "회전형이 빠르게 사오고 성인군자형이 빠르게 정리. <span class='highlight'>의외로 회전이 잘 됨</span>." }
        },
        "closet-neglect": {
            "closet-neglect": { score: 8, label: "🗑️+🗑️ 🚨 동거 금지 🚨", cls: "chaos", text: "아무도 정리 안 함. <span class='highlight'>3개월 후 옷장에서 생태계 발견</span>." },
            "fast-fashion": { score: 15, label: "🗑️+🔄 옷 산사태 예보", cls: "chaos", text: "한 명은 계속 사고 한 명은 절대 안 치움. <span class='highlight'>3개월이면 방 하나가 옷으로 매몰</span>." }
        },
        "fast-fashion": {
            "fast-fashion": { score: 42, label: "🔄+🔄 유행 쫓다 지침", cls: "chaos", text: "둘 다 유행 따라가느라 바쁨. <span class='highlight'>한 달에 옷값만 100만원</span>." }
        }
    };

    let myType = null, otherType = null;

    function getCompat(id1, id2) {
        if (compat[id1] && compat[id1][id2]) return compat[id1][id2];
        if (compat[id2] && compat[id2][id1]) return compat[id2][id1];
        return { score: 50, label: "알 수 없는 조합", cls: "meh", text: "데이터 준비 중!" };
    }

    function renderGrid(containerId, onSelect) {
        const grid = document.getElementById(containerId);
        typeList.forEach(t => {
            const btn = document.createElement('button');
            btn.className = 'type-btn';
            btn.dataset.id = t.id;
            btn.innerHTML = `${t.emoji} ${t.name}`;
            btn.onclick = () => onSelect(t, btn, containerId);
            grid.appendChild(btn);
        });
    }

    function selectMy(t, btn, containerId) {
        document.querySelectorAll(`#${containerId} .type-btn`).forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        myType = t;
        document.getElementById('mySelected').style.display = 'block';
        document.getElementById('mySelected').innerHTML = `나: ${t.emoji} <strong>${t.name}</strong>`;
        checkResult();
    }

    function selectOther(t, btn, containerId) {
        document.querySelectorAll(`#${containerId} .type-btn`).forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        otherType = t;
        document.getElementById('otherSelected').style.display = 'block';
        document.getElementById('otherSelected').innerHTML = `상대: ${t.emoji} <strong>${t.name}</strong>`;
        checkResult();
    }

    function checkResult() {
        if (!myType || !otherType) return;
        const c = getCompat(myType.id, otherType.id);
        const box = document.getElementById('resultBox');
        document.getElementById('rScore').className = `score ${c.cls}`;
        document.getElementById('rScore').textContent = `${c.score}%`;
        document.getElementById('rLabel').textContent = c.label;
        document.getElementById('rDetail').innerHTML = `${myType.emoji} ${myType.name} × ${otherType.emoji} ${otherType.name}<br><br>${c.text}`;
        box.style.display = 'block';
        box.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function shareResult() {
        const c = getCompat(myType.id, otherType.id);
        const text = `옷BTI 궁합 ${c.score}%! ${c.label}\n나: ${myType.emoji} ${myType.name}\n상대: ${otherType.emoji} ${otherType.name}\n\n너도 해봐! https://tinyurl.com/otBTI`;
        if (navigator.share) {
            navigator.share({ title: '옷BTI 궁합', text: text, url: 'https://tinyurl.com/otBTI' }).catch(() => {});
        } else {
            navigator.clipboard.writeText(text).then(() => alert('복사 완료! 카톡에 붙여넣기 💬'));
        }
    }

    // URL 파라미터로 바로 유형 선택
    const params = new URLSearchParams(window.location.search);
    renderGrid('myGrid', selectMy);
    renderGrid('otherGrid', selectOther);

    if (params.get('me')) {
        const t = typeList.find(x => x.id === params.get('me'));
        if (t) {
            const btn = document.querySelector(`#myGrid .type-btn[data-id="${t.id}"]`);
            selectMy(t, btn, 'myGrid');
        }
    }
    if (params.get('other')) {
        const t = typeList.find(x => x.id === params.get('other'));
        if (t) {
            const btn = document.querySelector(`#otherGrid .type-btn[data-id="${t.id}"]`);
            selectOther(t, btn, 'otherGrid');
        }
    }
</script>
</body>
</html>
