        function startQuiz() {

        function showQuestion() {
            const q = questions[current];
            document.getElementById('progress').style.width = ((current / questions.length) * 100) + '%';
            document.getElementById('qNum').textContent = `Q${current + 1} / ${questions.length}`;
            document.getElementById('backBtn').style.display = current === 0 ? 'none' : 'block';
            document.getElementById('qText').textContent = q.q;
            document.getElementById('qSub').textContent = q.sub || '';

            const optsEl = document.getElementById('options');
            optsEl.innerHTML = '';
            q.opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.text;
                btn.onclick = () => selectOption(i);
                optsEl.appendChild(btn);
            });

            // Re-trigger animation
            const quiz = document.getElementById('quiz');
            quiz.style.animation = 'none';
            quiz.offsetHeight;
            quiz.style.animation = 'slideIn 0.4s ease';
        }

        function goBack() {
            if (current > 0) {
                const prev = history.pop();
                scores[0] -= prev.s[0];
                scores[1] -= prev.s[1];
                scores[2] -= prev.s[2];
                current--;
                showQuestion();
            }
        }

        function selectOption(idx) {
            const opt = questions[current].opts[idx];
            history.push({ s: [...opt.s] });
            scores[0] += opt.s[0];
            scores[1] += opt.s[1];
            scores[2] += opt.s[2];

            // Visual feedback
            const btns = document.querySelectorAll('.option-btn');
            btns[idx].classList.add('selected');
            btns.forEach(b => b.style.pointerEvents = 'none');

            setTimeout(() => {
                current++;
                if (current < questions.length) {
                    showQuestion();
                } else {
                    showLoading();
                }
            }, 400);
        }

            document.getElementById('quiz').classList.add('hidden');

        function getCompat(id1, id2) {
            if (compat[id1] && compat[id1][id2]) return compat[id1][id2];
            if (compat[id2] && compat[id2][id1]) return compat[id2][id1];
            return { score: 50, label: "알 수 없는 조합", cls: "meh", text: "아직 데이터가 부족한 조합이에요!" };
        }

        function showCompat(otherId) {
            const myType = window._resultType;
            const c = getCompat(myType.id, otherId);
            const other = types.find(t => t.id === otherId);

            // Update button states
            document.querySelectorAll('.compat-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            const box = document.getElementById('compat-result');
            box.innerHTML = `
                <div class="compat-score ${c.cls}">${c.score}%</div>
                <div class="compat-label">${c.label}</div>
                <p class="compat-detail">${myType.emoji} ${myType.name} × ${other.emoji} ${other.name}<br><br>${c.text}</p>
                <button class="compat-share-btn" onclick="shareCompat('${otherId}')">💬 이 궁합 카톡으로 공유</button>
            `;
            box.style.display = 'block';
        }

        function shareCompat(otherId) {
            const myType = window._resultType;
            const other = types.find(t => t.id === otherId);
            const c = getCompat(myType.id, otherId);
            const text = `옷장 궁합 ${c.score}%! ${c.label}\n나: ${myType.emoji} ${myType.name}\n상대: ${other.emoji} ${other.name}\n\n너도 해봐!\nhttps://cmeetsp-jackie.github.io/charan-closet-test/`;
            if (navigator.share) {
                navigator.share({ title: '옷장 궁합 테스트', text: text, url: 'https://cmeetsp-jackie.github.io/charan-closet-test/' }).catch(() => {});
            } else {
                navigator.clipboard.writeText(text).then(() => alert('복사 완료! 카톡에 붙여넣기 💬'));
            }
        }

        function retry() {
            current = 0;
            scores = [0, 0, 0];
            history = [];
            document.getElementById('result').classList.add('hidden');
            document.getElementById('result').innerHTML = '';
            document.getElementById('intro').classList.remove('hidden');
        }
    </script>
