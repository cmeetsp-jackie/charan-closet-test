                emoji: "🔄",
                name: "패스트패션 회전형",
                mbti: "ESTP",
                minAsset: -1,
                asset: "520,000원",
                sleeping: "잠자는 자산: 약 35만원",
                equiv: "카페라떼 58잔",
                desc: "싸게 사서 빨리 입고 끝. 개당 단가는 낮은데 <span class='highlight'>양이 미침</span>. 모아서 한번에 보내면 의외로 짭짤합니다.",
                personality: "당신은 <span class='highlight'>행동파 트렌드세터</span>입니다. 고민보다 실행이 빠르고, 새로운 스타일을 시도하는 걸 두려워하지 않아요. 옷에 큰돈 쓰는 건 비효율적이라고 생각하고, 대신 다양한 스타일을 경험하는 게 중요한 사람. 유행에 가장 빠르지만 질리는 것도 가장 빠른 스피드형.",
                tip: "모아서 한번에 보내면 치킨값은 나와요"
            }
        ];

        let current = 0;
        let scores = [0, 0, 0]; // asset, sleeping, clean

        function startQuiz() {
            document.getElementById('intro').classList.add('hidden');
            document.getElementById('quiz').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[current];
            document.getElementById('progress').style.width = ((current / questions.length) * 100) + '%';
            document.getElementById('qNum').textContent = `Q${current + 1} / ${questions.length}`;
            document.getElementById('qText').textContent = q.q;

            const optsEl = document.getElementById('options');
            optsEl.innerHTML = '';
            q.opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.text;
                btn.onclick = () => selectOption(i);
                optsEl.appendChild(btn);
            });

            // Re-trigger animation
            const quiz = document.getElementById('quiz');
            quiz.style.animation = 'none';
            quiz.offsetHeight;
            quiz.style.animation = 'slideIn 0.4s ease';
        }

        function selectOption(idx) {
            const opt = questions[current].opts[idx];
            scores[0] += opt.s[0];
            scores[1] += opt.s[1];
            scores[2] += opt.s[2];

            // Visual feedback
            const btns = document.querySelectorAll('.option-btn');
            btns[idx].classList.add('selected');
            btns.forEach(b => b.style.pointerEvents = 'none');

            setTimeout(() => {
                current++;
                if (current < questions.length) {
                    showQuestion();
                } else {
                    showLoading();
                }
            }, 400);
        }

        function showLoading() {
            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            setTimeout(showResult, 2500);
        }

        function getType() {
            const asset = scores[0];
            for (const t of types) {
                if (asset >= t.minAsset) return t;
            }
            return types[types.length - 1];
        }

        function showResult() {
            document.getElementById('loading').classList.add('hidden');
            const t = getType();
            const el = document.getElementById('result');
            el.classList.remove('hidden');

            el.innerHTML = `
                <div class="result-type-emoji">${t.emoji}</div>
                <div class="result-type">${t.name}</div>
                <div class="result-asset">${t.asset}</div>
                <div class="result-sleeping">${t.sleeping}</div>

                <div class="result-desc">
                    <h3>${t.emoji} ${t.name} <span style="color:#888;font-size:14px;">${t.mbti}</span></h3>
                    <p>${t.desc}</p>
                </div>

                <div class="result-desc" style="border: 1px solid rgba(255,215,0,0.2); background: #111;">
                    <h3>🧠 ${t.name}의 성격</h3>
                    <p>${t.personality}</p>
                </div>

                <div class="result-fun">
                    잠자는 옷을 팔면<br>
                    <span class="equiv">🍗 ${t.equiv}</span><br>
                    살 수 있어요!
                </div>

                <div class="share-buttons">
                    <button class="share-btn kakao-btn" onclick="shareKakao()">
                        💬 카카오톡으로 공유하기
                    </button>
                    <button class="share-btn copy-btn" onclick="copyLink()">
                        🔗 링크 복사하기
                    </button>
                </div>

                <a href="https://charan.kr" target="_blank" class="charan-cta">
                    👗 차란에서 안 입는 옷 팔기 →
                </a>

                <button class="retry-btn" onclick="retry()">🔄 다시 테스트하기</button>

                <div class="footer">
                    <p>주식회사 마인이스 | 대표이사: 김혜성</p>
                    <p>서울특별시 성동구 아차산로 38, 9층</p>
                    <p>⚠️ 본 테스트의 감정가는 재미를 위한 추정치이며<br>실제 자산가치와 다를 수 있습니다.</p>
                    <p><a href="https://charan.kr">차란 앱 다운로드</a> · © 2026 Charan</p>
                </div>
            `;

            // Update OG dynamically for share
            window._resultType = t;
        }

        function shareKakao() {
            const t = window._resultType;
            const text = `내 옷장 추정 자산: ${t.asset} 💰\n나는 "${t.name}" (${t.mbti}) 이래ㅋㅋ 너는?\n\n`;
            const url = 'https://mineis-jj.github.io/charan-closet-test/';

            // Try Kakao SDK first, fallback to native share
            if (navigator.share) {
                navigator.share({
                    title: '내 옷장 자산 테스트 💰',
                    text: text,
                    url: url
                }).catch(() => {});
            } else {
                // Fallback: copy to clipboard
                const fullText = text + url;
                navigator.clipboard.writeText(fullText).then(() => {
                    alert('공유 텍스트가 복사되었습니다!\n카카오톡에 붙여넣기 하세요 💬');
                });
            }
        }

        function copyLink() {
            const t = window._resultType;
            const text = `내 옷장 추정 자산: ${t.asset} 💰 나는 "${t.name}" (${t.mbti})ㅋㅋ 너는?\nhttps://cmeetsp-jackie.github.io/charan-closet-test/`;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '✅ 복사 완료!';
                setTimeout(() => { btn.textContent = '🔗 링크 복사하기'; }, 2000);
            });
        }

        function retry() {
            current = 0;
            scores = [0, 0, 0];
            document.getElementById('result').classList.add('hidden');
            document.getElementById('result').innerHTML = '';
            document.getElementById('intro').classList.remove('hidden');
        }
    </script>
</body>
</html>
