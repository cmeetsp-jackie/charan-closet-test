        * { margin: 0; padding: 0; box-sizing: border-box; }

        .intro p { color: #aaa; font-size: 15px; margin-bottom: 24px; line-height: 1.6; }
        .social-proof {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 28px;
            padding: 14px 24px;

            border: 1px solid rgba(255, 215, 0, 0.15);

        }

        .social-proof .share-count {
            font-size: 16px;
            font-weight: 900;
            color: #FFD700;
        }
        .social-proof .share-label {
            font-size: 13px;
            color: #888;
        }
        .social-proof .divider {

            height: 24px;
            background: #333;
        }

            font-weight: 900;
            border-radius: 50px;

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #222;
            border-radius: 2px;
            margin-bottom: 40px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        /* Question */
        .question-screen { animation: slideIn 0.4s ease; }
        .q-number { color: #FFD700; font-size: 14px; font-weight: 700; margin-bottom: 12px; }
        .q-text { font-size: 22px; font-weight: 900; margin-bottom: 32px; line-height: 1.4; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn {
            background: #1a1a1a;
            border: 2px solid #333;
            color: #fff;
            padding: 18px 20px;
            font-size: 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-family: inherit;
            line-height: 1.4;

        .option-btn:hover { border-color: #FFD700; background: #1f1a00; }
        .option-btn.selected {
            border-color: #FFD700;
            background: linear-gradient(135deg, #1f1a00, #2a1f00);

        .result-type { font-size: 16px; color: #FFD700; font-weight: 700; margin-bottom: 8px; }
        .result-asset {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .result-sleeping {
            font-size: 18px;
            color: #ff6b6b;
            font-weight: 700;
            margin-bottom: 24px;
        }
        .result-desc {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: left;

        .result-desc h3 { font-size: 18px; margin-bottom: 12px; }

        .result-fun {

        /* Compatibility */
        .compat-section {
            margin-top: 32px;
            padding: 24px;
            background: #111;
            border: 1px solid #333;
            border-radius: 20px;
            text-align: center;

        .compat-btn {
            background: #1a1a1a;
            border: 2px solid #333;

            padding: 14px 8px;
            font-size: 13px;
            border-radius: 12px;

            font-family: inherit;
            line-height: 1.3;

        .compat-btn:hover { border-color: #FFD700; }

        .compat-result-box {

            margin-top: 16px;
            text-align: left;

        .compat-score {
            font-size: 36px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 8px;
        }
        .compat-score.great { color: #4CAF50; }
        .compat-score.good { color: #FFD700; }
        .compat-score.meh { color: #FF9800; }
        .compat-score.chaos { color: #ff6b6b; }
        .compat-label {
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .compat-detail { color: #bbb; font-size: 14px; line-height: 1.7; }
        .compat-detail .highlight { color: #FFD700; font-weight: 700; }
        .compat-share-btn {
            display: block;
            width: 100%;
            background: #FEE500;
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 16px;
            font-family: inherit;
        }

        .charan-cta {
            display: block;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            text-decoration: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 900;
            margin-top: 12px;

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #555;
            font-size: 11px;
            line-height: 1.8;
        }
        .footer a { color: #666; }

        .hidden { display: none !important; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes dots {
            0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; }
        }
    </style>
</head>

        function startQuiz() {
            document.getElementById('intro').classList.add('hidden');
            document.getElementById('quiz').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[current];
            document.getElementById('progress').style.width = ((current / questions.length) * 100) + '%';
            document.getElementById('qNum').textContent = `Q${current + 1} / ${questions.length}`;
            document.getElementById('qText').textContent = q.q;

            const optsEl = document.getElementById('options');
            optsEl.innerHTML = '';
            q.opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.text;
                btn.onclick = () => selectOption(i);
                optsEl.appendChild(btn);
            });

            // Re-trigger animation
            const quiz = document.getElementById('quiz');
            quiz.style.animation = 'none';
            quiz.offsetHeight;
            quiz.style.animation = 'slideIn 0.4s ease';
        }

        function selectOption(idx) {
            const opt = questions[current].opts[idx];
            scores[0] += opt.s[0];
            scores[1] += opt.s[1];
            scores[2] += opt.s[2];

            // Visual feedback
            const btns = document.querySelectorAll('.option-btn');
            btns[idx].classList.add('selected');
            btns.forEach(b => b.style.pointerEvents = 'none');

            setTimeout(() => {
                current++;
                if (current < questions.length) {
                    showQuestion();
                } else {
                    showLoading();
                }
            }, 400);
        }

        function showLoading() {
            document.getElementById('quiz').classList.add('hidden');

                "fast-fashion": { score: 65, label: "😇+🔄 적당한 균형", cls: "meh", text: "회전형이 빠르게 사고 성인군자형이 빠르게 정리. <span class='highlight'>의외로 회전이 잘 됨</span>." }
            },
            "closet-neglect": {
                "closet-neglect": { score: 25, label: "🗑️+🗑️ 옷장 블랙홀", cls: "chaos", text: "아무도 정리 안 함. 옷장에서 <span class='highlight'>3년 전 양말이 발굴</span>됨. 이사할 때만 후회하는 커플." },
                "fast-fashion": { score: 35, label: "🗑️+🔄 산더미", cls: "chaos", text: "한 명은 계속 사고 한 명은 안 치움. <span class='highlight'>방이 옷으로 뒤덮이는</span> 건 시간문제." }
            },
            "fast-fashion": {
                "fast-fashion": { score: 50, label: "🔄+🔄 트렌드 폭풍", cls: "meh", text: "둘 다 유행 따라가느라 바쁨. 옷이 빨리 들어오고 빨리 나감. <span class='highlight'>옷장 회전율 최고</span>지만 돈도 빨리 나감." }
            }
        };

        function getCompat(id1, id2) {
            if (compat[id1] && compat[id1][id2]) return compat[id1][id2];
            if (compat[id2] && compat[id2][id1]) return compat[id2][id1];
            return { score: 50, label: "알 수 없는 조합", cls: "meh", text: "아직 데이터가 부족한 조합이에요!" };
        }

        function showCompat(otherId) {
            const myType = window._resultType;
            const c = getCompat(myType.id, otherId);
            const other = types.find(t => t.id === otherId);

            // Update button states
            document.querySelectorAll('.compat-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            const box = document.getElementById('compat-result');
            box.innerHTML = `
                <div class="compat-score ${c.cls}">${c.score}%</div>
                <div class="compat-label">${c.label}</div>
                <p class="compat-detail">${myType.emoji} ${myType.name} × ${other.emoji} ${other.name}<br><br>${c.text}</p>
                <button class="compat-share-btn" onclick="shareCompat('${otherId}')">💬 이 궁합 카톡으로 공유</button>
            `;
            box.style.display = 'block';
        }

        function shareCompat(otherId) {
            const myType = window._resultType;
            const other = types.find(t => t.id === otherId);
            const c = getCompat(myType.id, otherId);
            const text = `옷장 궁합 ${c.score}%! ${c.label}\n나: ${myType.emoji} ${myType.name}\n상대: ${other.emoji} ${other.name}\n\n너도 해봐!\nhttps://cmeetsp-jackie.github.io/charan-closet-test/`;
            if (navigator.share) {
                navigator.share({ title: '옷장 궁합 테스트', text: text, url: 'https://cmeetsp-jackie.github.io/charan-closet-test/' }).catch(() => {});
            } else {
                navigator.clipboard.writeText(text).then(() => alert('복사 완료! 카톡에 붙여넣기 💬'));
            }
        }

        function retry() {
            current = 0;
            scores = [0, 0, 0];
            document.getElementById('result').classList.add('hidden');
            document.getElementById('result').innerHTML = '';
            document.getElementById('intro').classList.remove('hidden');
        }
    </script>
</body>
</html>
